#empty
beamline: nobeamline
namespace: nonamespace
epik8namespace: "apps.okd-datest.lnf.infn.it"
ingressClassName: "nginx"
targetRevision: "devel"
serviceAccountName: "default"
openshift: false

# ArgoCD RBAC resources - Enable only on ONE deployment to avoid SharedResourceWarning
# These are cluster-scoped resources and should only be created once
argocdRbac:
  enabled: false

## parameter for static ip allocations
## baseIP
baseIp:
startIp: 1

epicsConfiguration:
  name: "epics-configuration" # name of existing configMap that set CA parameters
  address_list: 
  max_array_bytes: "10000000"
  staticIp: true ## until CA/PVA bug
  services:
  applications:
  iocs:
  externalIoc:

usegateway: true # by default use gateway

## iocDefaults: per-template defaults merged into each IOC before rendering.
## Keys match the IOC's 'template' field (or 'devtype' as fallback).
## IOC-specific values always override defaults.
# iocDefaults:
#   agilent-vac:
#     charturl: 'https://github.com/infn-epics/ioc-chart.git'
#     template: "agilent-vac"
#     autosync: false

http_proxy:
https_proxy:
no_proxy:

backend:
  namespace: "backend"
  mongo:
    host: mongodb
    port: 27017
    user:
    pwd:
  elasticsearch:
    host: elasticsearch
    clusterName: elasticsearch
    port: 9200
  kafka:
    host: kafka-controller-headless
    port: 9092
## Dashboard backend — K8s/ArgoCD API proxy per beamline
dashboard:
  backend:
    enabled: false
    image: "ghcr.io/infn-epics/epik8s-dashboard/k8s-backend:latest"
    # argocdUrl: "https://argocd-server.argocd.svc"  # auto-detected
    # argocdToken: ""  # optional, falls back to SA token
    # allowedOrigins: "*"
    # replicas: 1
    # ingress: true
    # tls: true

softiocDefaults:
  charturl: 'https://github.com/infn-epics/ioc-chart.git'
  image: 'ghcr.io/infn-epics/epik8s-softioc-mng'

softiocs: []

cronjobs:
  charturl: 'https://baltig.infn.it/epics-containers/generic-application-chart.git'

iocs:
  charturl: 'https://github.com/infn-epics/ioc-chart.git'

syncPolicy:
    automated:
      prune: true  # Optional: Automatically remove resources not specified in Helm chart
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 
      - Prune=true
    
