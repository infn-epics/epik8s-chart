#empty
beamline: nobeamline
namespace: nonamespace
epik8namespace: "apps.okd-datest.lnf.infn.it"
ingressClassName: "nginx"
targetRevision: "devel"
serviceAccountName: "default"
openshift: false

# ArgoCD RBAC resources - Enable only on ONE deployment to avoid SharedResourceWarning
# These are cluster-scoped resources and should only be created once
argocdRbac:
  enabled: false

## parameter for static ip allocations
## baseIP
baseIp:
startIp: 1

epicsConfiguration:
  name: "epics-configuration" # name of existing configMap that set CA parameters
  address_list: 
  max_array_bytes: "10000000"
  staticIp: true ## until CA/PVA bug
  services:
  applications:
  iocs:
  externalIoc:

usegateway: true # by default use gateway

## iocDefaults: per-template defaults merged into each IOC before rendering.
## Keys match the IOC's 'template' field (or 'devtype' as fallback).
## IOC-specific values always override defaults.
# iocDefaults:
#   agilent-vac:
#     charturl: 'https://github.com/infn-epics/ioc-chart.git'
#     template: "agilent-vac"
#     autosync: false

## argusDefaults: chart-wide defaults for the "argus" service (ARGUS MCP +
## LibreChat). Applied only when a beamline defines
## epicsConfiguration.services.argus — that block's own values always win
## over these (mustMergeOverwrite, same pattern as iocDefaults above).
## Backend addresses (EPICS gateway, archiver, channelfinder, olog) and the
## LibreChat ingress host / proxy env vars are computed per-beamline instead
## (see the "argus-computed" helper + the "argus" branch in
## templates/services.yaml) and merged in underneath these static defaults.
argusDefaults:
  charturl: 'https://github.com/infn-epics/argus-helm-chart.git'
  targetRevision: main
  autosync: false
  enable_ingress: true
  auth:
    mode: basic
    basic:
      allowRegistration: true
      allowPasswordReset: true
  argusMcp:
    enabled: true
    image:
      repository: ghcr.io/infn-epics/argus-mcp-server
      tag: latest
    rbac:
      clusterWide: false
    backends:
      # The platform's shared Loki instance (epik8s-platform's "logging"
      # domain) is one cluster-wide instance, not one per beamline -- unlike
      # archiver/channelfinder/olog below, which are computed per-beamline in
      # the "argus-computed" helper, this is a static default so every
      # beamline's argus-mcp gets pod log history with zero per-beamline
      # config. Only meaningful on clusters that actually deployed that
      # domain; harmless (argus-mcp just treats Loki as unconfigured) where
      # it hasn't been.
      loki:
        baseUrl: "http://epik8s-platform-loki.logging.svc.cluster.local:3100"

http_proxy:
https_proxy:
no_proxy:

backend:
  namespace: "backend"
  mongo:
    host: mongodb
    port: 27017
    user:
    pwd:
  elasticsearch:
    host: elasticsearch
    clusterName: elasticsearch
    port: 9200
  kafka:
    host: kafka-controller-headless
    port: 9092
## Dashboard backend — K8s/ArgoCD API proxy per beamline
dashboard:
  backend:
    enabled: false
    image: "ghcr.io/infn-epics/epik8s-dashboard/k8s-backend:latest"
    # argocdUrl: "https://argocd-server.argocd.svc"  # auto-detected
    # argocdToken: ""  # optional, falls back to SA token
    # allowedOrigins: "*"
    # replicas: 1
    # ingress: true
    # tls: true

softiocDefaults:
  charturl: 'https://github.com/infn-epics/ioc-chart.git'
  image: 'ghcr.io/infn-epics/epik8s-softioc-mng'

softiocs: []

cronjobs:
  charturl: 'https://baltig.infn.it/epics-containers/generic-application-chart.git'

iocs:
  charturl: 'https://github.com/infn-epics/ioc-chart.git'

syncPolicy:
    automated:
      prune: true  # Optional: Automatically remove resources not specified in Helm chart
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 
      - Prune=true
    
