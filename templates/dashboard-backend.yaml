{{- if .Values.dashboard }}
{{- if .Values.dashboard.backend }}
{{- if .Values.dashboard.backend.enabled }}
#############################################################################
# EPIK8s Dashboard Backend
# K8s / ArgoCD API proxy — runs in the beamline namespace.
# Provides REST endpoints for the dashboard frontend.
#############################################################################

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: epik8s-dashboard-backend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
    app.kubernetes.io/component: dashboard
    epik8s.infn.it/beamline: {{ .Values.beamline }}

---
# Role — scoped to beamline namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: epik8s-dashboard-backend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: epik8s-dashboard-backend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
subjects:
  - kind: ServiceAccount
    name: epik8s-dashboard-backend
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: epik8s-dashboard-backend

---
# ClusterRole — read/patch ArgoCD Application CRDs (lives in argocd namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: epik8s-dashboard-backend-{{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
    epik8s.infn.it/beamline: {{ .Values.beamline }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch", "delete"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: epik8s-dashboard-backend-{{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
    epik8s.infn.it/beamline: {{ .Values.beamline }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: epik8s-dashboard-backend-{{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: epik8s-dashboard-backend
    namespace: {{ .Values.namespace }}

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: epik8s-dashboard-backend-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
data:
  allowed-origins: {{ .Values.dashboard.backend.allowedOrigins | default "*" | quote }}

{{- if .Values.dashboard.backend.argocdToken }}
---
# ArgoCD token secret (optional — falls back to SA token)
apiVersion: v1
kind: Secret
metadata:
  name: epik8s-dashboard-backend-secret
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
type: Opaque
stringData:
  argocd-token: {{ .Values.dashboard.backend.argocdToken | quote }}
{{- end }}

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epik8s-dashboard-backend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
    app.kubernetes.io/component: dashboard
    epik8s.infn.it/beamline: {{ .Values.beamline }}
spec:
  replicas: {{ .Values.dashboard.backend.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: epik8s-dashboard-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: epik8s-dashboard-backend
        epik8s.infn.it/beamline: {{ .Values.beamline }}
    spec:
      serviceAccountName: epik8s-dashboard-backend
      containers:
        - name: backend
          image: {{ .Values.dashboard.backend.image | default "ghcr.io/infn-epics/epik8s-dashboard/k8s-backend:latest" }}
          imagePullPolicy: {{ .Values.dashboard.backend.imagePullPolicy | default "Always" }}
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: PORT
              value: "3001"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ARGOCD_NAMESPACE
              value: {{ .Values.argocdNamespace | default "argocd" | quote }}
            {{- if .Values.dashboard.backend.argocdToken }}
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: epik8s-dashboard-backend-secret
                  key: argocd-token
            {{- else if .Values.dashboard.backend.argocdTokenSecret }}
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dashboard.backend.argocdTokenSecret.name }}
                  key: {{ .Values.dashboard.backend.argocdTokenSecret.key | default "token" }}
            {{- end }}
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: epik8s-dashboard-backend-config
                  key: allowed-origins
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- if .Values.dashboard.backend.resources }}
            {{- toYaml .Values.dashboard.backend.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
            {{- end }}

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: epik8s-dashboard-backend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: epik8s-dashboard-backend

{{- if .Values.dashboard.backend.ingress | default true }}
---
# Ingress — {namespace}-backend.{epik8namespace}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: epik8s-dashboard-backend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: epik8s-dashboard-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: {{ .Values.dashboard.backend.allowedOrigins | default "*" | quote }}
spec:
  {{- if .Values.ingressClassName }}
  ingressClassName: {{ .Values.ingressClassName }}
  {{- end }}
  rules:
    - host: {{ .Values.namespace }}-backend.{{ .Values.epik8namespace }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: epik8s-dashboard-backend
                port:
                  number: 3001
  {{- if .Values.dashboard.backend.tls | default true }}
  tls:
    - hosts:
        - {{ .Values.namespace }}-backend.{{ .Values.epik8namespace }}
  {{- end }}
{{- end }}

{{- end }}
{{- end }}
{{- end }}
